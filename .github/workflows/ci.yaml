name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,          name: darwin-arm64 }
          - { os: macos-13,          name: darwin-amd64 }
          - { os: windows-2022,      name: windows-amd64 }
          - { os: ubuntu-22.04,      name: linux-amd64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install ALSA (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...
    